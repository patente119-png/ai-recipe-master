<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 레시피 마스터</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #f8fafc, #e2e8f0);
      color: #222;
    }
    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 28px 16px 60px;
    }
    .hero {
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color: white;
  border-radius: 28px;
  padding: 32px 24px;
  box-shadow: 0 15px 35px rgba(0,0,0,.18);
}
    h1 { margin: 0 0 8px; font-size: 32px; }
    .sub { margin: 0; color: #fde68a; line-height: 1.5; }
.card {
  background: white;
  border-radius: 28px;
  padding: 30px;
  box-shadow: 0 10px 30px rgba(0,0,0,.08);
  border: 1px solid #e5e7eb;
}
    label { display: block; margin: 16px 0 8px; font-weight: 700; }
    textarea, select {
      width: 100%;
      border: 2px solid #e5e7eb;
      border-radius: 14px;
      padding: 14px;
      font-size: 16px;
      background: #fff;
    }
    textarea { min-height: 110px; resize: vertical; }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    button {
      border: 0;
      border-radius: 14px;
      padding: 15px 16px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }
    .primary { width: 100%; margin-top: 18px; background: linear-gradient(135deg,#f59e0b,#ea580c);
color:white;
font-weight:700; color: #111827; }
    .secondary {
  background: linear-gradient(135deg,#2563eb,#1d4ed8);
  color: white;
}
    .ghost {
  background: #f8fafc;
  color: #111827;
  border: 1px solid #e5e7eb;
}
.kakao-btn {
  background: #FEE500 !important;
  color: #191919 !important;
  border: none;
  border-radius: 14px;
  padding: 15px 16px;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
}

.kakao-btn:hover {
  opacity: 0.9;
}
  #result {
  background:#fffdf5;
  border:2px solid #fbbf24;
  border-radius:20px;
  padding:20px;
  line-height:1.8;
  font-size:17px;

  white-space: pre-wrap;
}
    .actions {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-top: 14px;
}
    .notice { font-size: 13px; color: #6b7280; line-height: 1.5; margin-top: 10px; }
    @media (max-width: 640px) {
      h1 { font-size: 26px; }
      .grid, .actions { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>🍳 AI 레시피 마스터</h1>
      <p class="sub">냉장고 재료를 입력하고 한식·중식·일식·양식 중 하나를 선택하면 AI가 집밥 레시피를 만들어 줍니다.</p>
    </section>

    <section class="card">
      <label for="ingredients">재료 입력</label>
      <textarea id="ingredients" placeholder="예: 계란 2개, 양파 반 개, 참치캔, 김치 조금"></textarea>

      <div class="grid">
        <div>
          <label for="cuisine">요리 종류</label>
          <select id="cuisine">
            <option value="한식">🍚 한식</option>
            <option value="중식">🥟 중식</option>
            <option value="일식">🍣 일식</option>
            <option value="양식">🍝 양식</option>
          </select>
        </div>
        <div>
          <label for="servings">인원수</label>
          <select id="servings">
            <option value="1인분">1인분</option>
            <option value="2인분" selected>2인분</option>
            <option value="3인분">3인분</option>
            <option value="4인분">4인분</option>
          </select>
        </div>
      </div>

      <button class="primary" onclick="generateRecipe()">AI 레시피 생성</button>
      <p class="notice">※ 레시피는 참고용입니다. 알레르기, 질환, 식이 제한이 있으면 반드시 본인 상황에 맞게 조정하세요.</p>
    </section>

    <section class="card">
      <h2>결과</h2>
      <div id="result">재료를 입력한 뒤 레시피 생성 버튼을 눌러 주세요.</div>
      <div class="actions">
  <button class="secondary" onclick="speakRecipe()">🔊 듣기</button>

  <button class="ghost" onclick="stopSpeaking()">⏹ 중지</button>

  <button class="ghost" onclick="copyRecipe()">📋 복사</button>
  
  <button class="kakao-btn" onclick="shareKakao()">
  💬 카카오톡 공유
  </button>
      </div>
    </section>
  </div>

<script src="https://developers.kakao.com/sdk/js/kakao.js"></script>

<script>
Kakao.init('cb69aadd8f94c482f8bc7a2ceb7204bd');

async function generateRecipe() {
  const ingredients = document.getElementById('ingredients').value.trim();
  const cuisine = document.getElementById('cuisine').value;
  const servings = document.getElementById('servings').value;
  const result = document.getElementById('result');

  if (!ingredients) {
    alert('재료를 입력해 주세요.');
    return;
  }

  result.textContent = 'AI가 레시피를 만들고 있습니다...';

  try {
    const response = await fetch('/api/recipe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ingredients, cuisine, servings })
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.error || '오류가 발생했습니다.');
    }

    result.textContent = data.recipe;
  } catch (error) {
    result.textContent = '오류: ' + error.message;
  }
}

let currentAudio = null;

    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text })
  });

  if (!response.ok) {
    alert('음성 생성 중 오류가 발생했습니다.');
    return;
  }

  const blob = await response.blob();
  const audioUrl = URL.createObjectURL(blob);

  currentAudio = new Audio(audioUrl);
  currentAudio.play();
}

function stopSpeaking() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
  }
}

async function copyRecipe() {
  const text = document.getElementById('result').textContent;
  await navigator.clipboard.writeText(text);
  alert('레시피가 복사되었습니다.');
}

function shareKakao() {
  const recipe = document.getElementById('result').innerText;

  if (!recipe || recipe.includes('재료를 입력')) {
    alert('먼저 레시피를 생성해 주세요.');
    return;
  }

  Kakao.Share.sendDefault({
    objectType: 'feed',
    content: {
      title: 'AI 레시피 마스터',
      description: recipe.substring(0, 150),
      imageUrl: 'https://via.placeholder.com/300x200.png?text=AI+Recipe',
      link: {
        mobileWebUrl: 'https://ai-recipe-master.vercel.app',
        webUrl: 'https://ai-recipe-master.vercel.app'
      }
    },
    buttons: [
      {
        title: '레시피 보기',
        link: {
          mobileWebUrl: 'https://ai-recipe-master.vercel.app',
          webUrl: 'https://ai-recipe-master.vercel.app'
        }
      }
    ]
  });
}
</script>
</body>
</html>
